<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javascript Interview Preparation Kit By Lavan Kumar</title>
<link rel="stylesheet" href="../globalpagescss.css">
<link rel="shortcut icon" href="../weblogo.png" type="image/x-icon">
</head>
<body>

<div class="sidebar" id="sidebar">
    <h2>All Questions</h2>

    <ul class="question-list" id="questionList"></ul>
</div>

<div class="main">
 
    <div class="header">
       
        <h1>Javascript Interview Preparation</h1>

        <div class="progress-info">
            <span id="progressText"></span>
            <span id="percentage"></span>
        </div>

        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <div class="card">

        <div class="badge" id="badge"></div>

        <h2 class="question" id="question"></h2>

        <div class="answer-title">
            Answer
        </div>

        <div class="answer" id="answer"></div>

    </div>

    <div class="buttons">
        <button class="prev" id="prevBtn">
    Prev
</button>

<button class="next" id="nextBtn">
    Next
</button>

<button class="toggle" id="toggleBtn">
    All Questions
</button>
<a class="home" href="../index.html" >
    Home
</a>
    </div>

</div>

<script src="./jsquestions.js" type="module"></script>

</body>
</html>
